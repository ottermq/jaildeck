{{ define "content" }}

<h1>{{ .Title }}</h1>

<table>
    <thead>
        <tr>
            <th>Name</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {{ range .Jails }}
        {{ template "components/jail_row.html" . }}
        {{ end }}
    </tbody>
</table>
{{ end }}
